<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Blue Economy Supply-Demand Synergy</title>

<!-- MapLibre GL CSS -->
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />

<!-- Font-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">

  <style>
  :root {
    --bg: #90e0e0;
    --bg-panel: #141a22;
    --bg-panel-2: #1c242f;
    --ink: #e8ecf2;
    --ink-dim: #8b96a5;
    --ink-faint: #4a5260;
    --rule: #232c38;

    --supply: #e8a838;        /* warm gold */
    --demand: #f05b5b;        /* red */
    --conservation: #7bc97c;  /* sage */
    --context: #b48ed9;       /* dusty violet */

    --accent: #e8a838;
    --danger: #d96a5a;

    --font-display: "Google Sans", sans-serif;
    --font-mono: "Google Sans", sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: 13px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  #app {
    display: grid;
    grid-template-columns: 320px 1fr 360px;
    height: 100vh;
  }

  /* ========== LEFT PANEL: layer controls ========== */
  #sidebar {
    background: var(--bg-panel);
    border-right: 1px solid var(--rule);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  #sidebar header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--rule);
  }

  #sidebar header h1 {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 28px;
    line-height: 1.05;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }

  #sidebar header h1 em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  #sidebar header p {
    color: var(--ink-dim);
    font-size: 11px;
    line-height: 1.5;
    letter-spacing: 0.02em;
  }

  .layer-group {
    padding: 18px 24px;
    border-bottom: 1px solid var(--rule);
  }

  .layer-group h2 {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 400;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .layer-group h2::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .layer-group[data-cat="supply"] h2::before        { background: var(--supply); }
  .layer-group[data-cat="demand"] h2::before        { background: var(--demand); }
  .layer-group[data-cat="conservation"] h2::before  { background: var(--conservation); }
  .layer-group[data-cat="context"] h2::before       { background: var(--context); }

  .layer-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    cursor: pointer;
    user-select: none;
    color: var(--ink);
    transition: color 0.12s ease;
  }

  .layer-row:hover { color: var(--accent); }

  .layer-row input { display: none; }

  .layer-row .check {
    width: 14px;
    height: 14px;
    border: 1px solid var(--ink-faint);
    flex-shrink: 0;
    position: relative;
    border-radius: 2px;
  }

  .layer-row input:checked ~ .check {
    background: var(--accent);
    border-color: var(--accent);
  }

  .layer-row input:checked ~ .check::after {
    content: '';
    position: absolute;
    inset: 3px;
    background: var(--bg);
    border-radius: 1px;
  }

  .layer-row label {
    font-size: 12px;
    cursor: pointer;
    flex: 1;
  }

  /* ========== CENTER: map ========== */
  #map {
    width: 100%;
    height: 100%;
    background: #1a2028;
  }

  /* MapLibre overrides */
  .maplibregl-ctrl-attrib {
    background: rgba(20, 26, 34, 0.85) !important;
    color: var(--ink-dim) !important;
    font-family: var(--font-mono) !important;
    font-size: 10px !important;
  }
  .maplibregl-ctrl-attrib a { color: var(--ink-dim) !important; }
  .maplibregl-popup-content {
    background: var(--bg-panel) !important;
    color: var(--ink) !important;
    font-family: var(--font-mono) !important;
    border: 1px solid var(--rule) !important;
    border-radius: 0 !important;
    padding: 12px 14px !important;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5) !important;
  }
  .maplibregl-popup-tip { display: none !important; }

  /* ========== RIGHT PANEL: parcel inspector ========== */
  #inspector {
    background: var(--bg-panel);
    border-left: 1px solid var(--rule);
    overflow-y: auto;
    padding: 28px 24px;
  }

  #inspector .empty-state {
    color: var(--ink-faint);
    font-size: 12px;
    line-height: 1.6;
    font-style: italic;
    font-family: var(--font-display);
  }

  #inspector h2 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 22px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }

  #inspector .parcel-id {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.08em;
    margin-bottom: 24px;
    text-transform: uppercase;
  }

  .score-card {
    background: var(--bg-panel-2);
    border: 1px solid var(--rule);
    padding: 16px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }

  .score-card::before {
    content: '';
    position: absolute;
    inset: 0 auto 0 0;
    width: 3px;
    background: var(--accent);
  }

  .score-card .label {
    font-size: 10px;
    color: var(--ink-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .score-card .value {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 36px;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  .score-card .unit {
    font-size: 11px;
    color: var(--ink-dim);
    margin-left: 6px;
    font-weight: 400;
  }

  .attr-section {
    margin-bottom: 22px;
  }

  .attr-section h3 {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 400;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    padding-bottom: 6px;
    margin-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }

  .attr {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 4px 0;
    font-size: 12px;
    gap: 12px;
  }

  .attr .k {
    color: var(--ink-dim);
    flex-shrink: 0;
  }

  .attr .v {
    text-align: right;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }

  .attr .v.flag-yes { color: var(--accent); }
  .attr .v.flag-no  { color: var(--ink-faint); }

  /* Loading overlay */
  #loading {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }

  #loading.hidden { opacity: 0; }

  #loading .text {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 18px;
    color: var(--ink-dim);
    letter-spacing: 0.04em;
  }

  /* Subtle scrollbars */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }
</style>
</head>
<body>

<div id="loading"><div class="text">Loading the atlas&hellip;</div></div>

<div id="app">

  <!-- ========== LEFT: layer toggles ========== -->
  <aside id="sidebar">
    <header>
      <h1>Marine Energy <em>Atlas</em></h1>
      <p>Supply, demand, conservation &amp; context layers for offshore renewable energy siting.</p>
    </header>
    <!-- layer groups injected by JS -->
    <div id="layer-controls"></div>
  </aside>

  <!-- ========== CENTER: map ========== -->
  <div id="map"></div>

  <!-- ========== RIGHT: parcel inspector ========== -->
  <aside id="inspector">
    <div class="empty-state">
      Click any offshore parcel or coastal county to inspect its synergy attributes.
    </div>
  </aside>

</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles@3.2.1/dist/pmtiles.js"></script>

<script>

const TILE_BASE = './tiles';


const LAYERS = [

  { id: 'wave_potential', color: '#ffee82',      title: 'Wave energy potential',     category: 'supply', kind: 'fill' },
  { id: 'wave_sites', color: '#ffee82',          title: 'Wave sites of interest',    category: 'supply', kind: 'circle' },
  { id: 'tidal_sites_wecc', color: '#5f27cd',    title: 'Tidal sites — West',        category: 'supply', kind: 'circle' },
  { id: 'tidal_sites_east', color: '#5f27cd',    title: 'Tidal sites — East',        category: 'supply', kind: 'circle' },
  { id: 'tidal_sites_ak', color: '#5f27cd',      title: 'Tidal sites — Alaska',      category: 'supply', kind: 'circle' },
  { id: 'wind_speeds_90m', color: '#82ffa5',     title: 'Offshore wind speed (90 m)',category: 'supply', kind: 'fill' },
  { id: 'wind_lease_areas', color: '#82ffa5',   title: 'Wind lease areas',          category: 'supply', kind: 'fill' },
  { id: 'wind_planning_areas', color: '#82ffa5', title: 'Wind planning areas',       category: 'supply', kind: 'fill' },
  { id: 'coastal_energy_facilities',  color: '#FFFFFF', title: 'Coastal energy facilities', category: 'supply', kind: 'circle' },


  { id: 'h2_stations',    color: '#855f5f',     title: 'Hydrogen fueling stations', category: 'demand', kind: 'circle' },
  { id: 'h2_hubs',     color: '#855f5f',        title: 'DOE hydrogen hubs',         category: 'demand', kind: 'fill' },
  { id: 'oil_gas_platforms_pacific', color:  '#3d5169', title: 'Oil & gas — Pacific', category: 'demand', kind: 'circle' },
  { id: 'oil_gas_platforms_gom', color: '#3d5169',    title: 'Oil & gas — Gulf',    category: 'demand', kind: 'circle' },
  { id: 'deepwater_ports',  color: '#d94acf',   title: 'Deepwater ports',           category: 'demand', kind: 'circle' },
  { id: 'principal_ports',  color: '#d94acf',    title: 'Principal ports',           category: 'demand', kind: 'circle' },
  { id: 'aquaculture',  color: '#ff6b6b',       title: 'Aquaculture operations',    category: 'demand', kind: 'circle' },

  { id: 'mpas', color: '#5f8560,               title: 'Marine protected areas',    category: 'conservation', kind: 'fill' },

  { id: 'coastal_counties',   color: '#48b8b2',  title: 'Coastal counties',          category: 'context', kind: 'fill' },
  { id: 'justice40_dac',     color: '#d9a44a',   title: 'Justice40 DACs',            category: 'context', kind: 'fill' },
  { id: 'transmission', color: '#FFFFFF',       title: 'Transmission lines',        category: 'context', kind: 'line' },

  { id: 'parcels',             title: 'Parcels (synergy score)',   category: 'supply', kind: 'fill', defaultOn: true, isParcels: true },
];

const css = getComputedStyle(document.documentElement);
const COLOR = {
  supply:       css.getPropertyValue('--supply').trim(),
  demand:       css.getPropertyValue('--demand').trim(),
  conservation: css.getPropertyValue('--conservation').trim(),
  context:      css.getPropertyValue('--context').trim(),
  ink:          css.getPropertyValue('--ink').trim(),
  inkDim:       css.getPropertyValue('--ink-dim').trim(),
};


const protocol = new pmtiles.Protocol();
maplibregl.addProtocol('pmtiles', protocol.tile);


const baseStyle = {
  version: 8,
  glyphs: 'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
  sources: {},
  layers: [
    { id: 'background', type: 'background', paint: { 'background-color': '#90e0e0' } },
  ],
};


const map = new maplibregl.Map({
  container: 'map',
  style: baseStyle,
  center: [-95, 38],   // continental US-ish
  zoom: 3.6,
  attributionControl: false,
});
map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');
map.addControl(new maplibregl.AttributionControl({
  customAttribution: 'Data: BOEM, NOAA, DOE, NREL, USGS, EPA',
  compact: true,
}), 'bottom-right');



function paintForLayer(layer) {
  const cat = layer.color || COLOR[layer.category];

  // Special-case: parcels with synergy score color ramp
  if (layer.isParcels) {
    return {
      type: 'fill',
      paint: {
        'fill-color': [
          'interpolate', ['linear'], ['coalesce', ['get', 'synergy_score'], 0],
          0, '#2a3340',
          2, '#85622d',
          4, '#c98735',
          6, '#e8a838',
          8, '#f5d770',
        ],
        'fill-opacity': [
          'case',
          ['boolean', ['feature-state', 'hover'], false], 0.85,
          0.55,
        ],
        'fill-outline-color': '#90e0e0',
      },
    };
  }

  // Wave potential — blue/teal ramp on annual flux
  if (layer.id === 'wave_potential') {
    return {
      type: 'fill',
      paint: {
        'fill-color': [
          'interpolate', ['linear'], ['coalesce', ['get', 'ann_wef'], 0],
          0,  '#1a2028',
          15, '#2d5670',
          30, '#3f8aab',
          50, '#5fb6ce',
          80, '#a8dde9',
        ],
        'fill-opacity': 0.75,
      },
    };
  }

  // Wind speed at 90 m — sequential
  if (layer.id === 'wind_speeds_90m') {
    return {
      type: 'fill',
      paint: {
        'fill-color': [
          'interpolate', ['linear'], ['coalesce', ['get', 'ws_90m_ms'], 0],
          5,  '#2a2618',
          7,  '#7a6020',
          9,  '#c89328',
          11, '#e8a838',
          13, '#f7d77a',
        ],
        'fill-opacity': 0.7,
      },
    };
  }

  // MPAs — sage with a strong outline
  if (layer.id === 'mpas') {
    return {
      type: 'fill',
      paint: {
        'fill-color': cat,
        'fill-opacity': 0.18,
        'fill-outline-color': cat,
      },
    };
  }

  // Justice40 — violet, very subtle
  if (layer.id === 'justice40_dac') {
    return {
      type: 'fill',
      paint: {
        'fill-color': cat,
        'fill-opacity': 0.22,
      },
    };
  }

  // Generic by kind
  if (layer.kind === 'fill') {
    return {
      type: 'fill',
      paint: {
        'fill-color': cat,
        'fill-opacity': 0.35,
        'fill-outline-color': cat,
      },
    };
  }
  if (layer.kind === 'line') {
    return {
      type: 'line',
      paint: {
        'line-color': cat,
        'line-width': ['interpolate', ['linear'], ['zoom'], 4, 0.4, 12, 1.6],
        'line-opacity': 0.7,
      },
    };
  }
  // circle (points)
  return {
    type: 'circle',
    paint: {
      'circle-radius':       ['interpolate', ['linear'], ['zoom'], 4, 2.5, 12, 7],
      'circle-color':        cat,
      'circle-stroke-width': 1,
      'circle-stroke-color': '#90e0e0',
      'circle-opacity':      0.9,
    },
  };
}

// ============================================================
// LAYER REGISTRATION
// ============================================================

function addLayerToMap(layer) {
  const url = `${TILE_BASE}/${layer.id}.pmtiles`;
  const sourceId = layer.id;

  if (!map.getSource(sourceId)) {
    map.addSource(sourceId, {
      type: 'vector',
      url: `pmtiles://${url}`,
      attribution: '',
    });
  }

  const paint = paintForLayer(layer);
  const layerId = `${layer.id}__main`;

  if (!map.getLayer(layerId)) {
    map.addLayer({
      id: layerId,
      type: paint.type,
      source: sourceId,
      'source-layer': layer.id,
      paint: paint.paint,
      layout: { visibility: layer.defaultOn ? 'visible' : 'none' },
    });
  }
}

function setLayerVisible(layerId, visible) {
  const id = `${layerId}__main`;
  if (map.getLayer(id)) {
    map.setLayoutProperty(id, 'visibility', visible ? 'visible' : 'none');
  }
}

// ============================================================
// SIDEBAR UI
// ============================================================

function buildSidebar() {
  const groups = { supply: [], demand: [], conservation: [], context: [] };
  for (const l of LAYERS) groups[l.category].push(l);

  const labels = {
    supply: 'Supply',
    demand: 'Demand',
    conservation: 'Conservation',
    context: 'Context',
  };

  const root = document.getElementById('layer-controls');
  for (const cat of ['supply', 'demand', 'conservation', 'context']) {
    if (!groups[cat].length) continue;
    const group = document.createElement('div');
    group.className = 'layer-group';
    group.dataset.cat = cat;
    group.innerHTML = `<h2>${labels[cat]}</h2>`;
    for (const l of groups[cat]) {
      const row = document.createElement('label');
      row.className = 'layer-row';
      row.innerHTML = `
        <input type="checkbox" data-layer="${l.id}" ${l.defaultOn ? 'checked' : ''}>
        <span class="check"></span>
        <span>${l.title}</span>
      `;
      row.querySelector('input').addEventListener('change', e => {
        setLayerVisible(l.id, e.target.checked);
      });
      group.appendChild(row);
    }
    root.appendChild(group);
  }
}

// ============================================================
// PARCEL INSPECTOR
// ============================================================

const ATTR_GROUPS = [
  {
    title: 'Resource',
    attrs: [
      ['wave_power_kw_m_mean',   'Wave power (mean)',     v => fmt(v, 1, 'kW/m')],
      ['wave_power_kw_m_max',    'Wave power (max)',      v => fmt(v, 1, 'kW/m')],
      ['wind_speed_90m_ms_mean', 'Wind @ 90 m (mean)',    v => fmt(v, 1, 'm/s')],
      ['tidal_density_mean',     'Tidal density (mean)',  v => fmt(v, 1)],
    ],
  },
  {
    title: 'Existing infrastructure',
    attrs: [
      ['oil_gas_platforms_count',      'Oil & gas platforms',  fmtInt],
      ['coastal_energy_facilities_count', 'Coastal facilities',  fmtInt],
      ['aquaculture_operations_count', 'Aquaculture sites',    fmtInt],
      ['offshore_wind_lease_number',   'Wind lease no.',       fmtStr],
      ['wave_site_of_interest',        'Wave site of interest', fmtBool],
      ['tidal_site_of_interest',       'Tidal site of interest', fmtBool],
    ],
  },
  {
    title: 'Logistics',
    attrs: [
      ['nearest_port_km',       'Nearest port',          v => fmt(v, 1, 'km')],
      ['nearest_port_name',     'Port name',             fmtStr],
      ['nearest_h2_station_km', 'Nearest H₂ station',    v => fmt(v, 1, 'km')],
    ],
  },
  {
    title: 'Constraints',
    attrs: [
      ['within_mpa',          'Within MPA',          fmtBool],
      ['justice40_dac',       'Justice40 DAC',       fmtBool],
    ],
  },
];

function fmt(v, digits, unit) {
  if (v === null || v === undefined || v === '' || Number.isNaN(+v)) return '—';
  const n = (+v).toFixed(digits);
  return unit ? `${n} <span style="color:var(--ink-dim)">${unit}</span>` : n;
}
function fmtInt(v) {
  if (v === null || v === undefined) return '—';
  return Number.isFinite(+v) ? Math.round(+v).toString() : '—';
}
function fmtStr(v) {
  if (v === null || v === undefined || v === '') return '—';
  return String(v);
}
function fmtBool(v) {
  if (v === true || v === 'true' || v === 1) return '<span class="flag-yes">yes</span>';
  if (v === false || v === 'false' || v === 0) return '<span class="flag-no">no</span>';
  return '—';
}

function renderInspector(props) {
  const root = document.getElementById('inspector');
  if (!props) {
    root.innerHTML = `<div class="empty-state">Click any offshore parcel or coastal county to inspect its synergy attributes.</div>`;
    return;
  }

  const synergy = props.synergy_score;
  const diversity = props.supply_diversity_index;

  let html = `
    <h2>${props.county_name || props.parcel_id || 'Parcel'}</h2>
    <div class="parcel-id">${props.parcel_type || '—'} · ${props.parcel_id || ''}</div>
    <div class="score-card">
      <div class="label">Synergy score</div>
      <div class="value">${synergy != null ? (+synergy).toFixed(2) : '—'}</div>
    </div>
    <div class="score-card" style="margin-bottom:28px">
      <div class="label">Supply diversity</div>
      <div class="value">${diversity != null ? (+diversity).toFixed(2) : '—'}</div>
    </div>
  `;

  for (const group of ATTR_GROUPS) {
    html += `<div class="attr-section"><h3>${group.title}</h3>`;
    for (const [key, label, formatter] of group.attrs) {
      const v = props[key];
      html += `<div class="attr"><span class="k">${label}</span><span class="v">${formatter(v)}</span></div>`;
    }
    html += `</div>`;
  }

  root.innerHTML = html;
}

// Track the currently-hovered parcel for the highlight effect
let hoveredParcelId = null;

function wireParcelInteractions() {
  const layerId = 'parcels__main';

  map.on('click', layerId, (e) => {
    if (!e.features?.length) return;
    renderInspector(e.features[0].properties);
  });

  map.on('mousemove', layerId, (e) => {
    map.getCanvas().style.cursor = 'pointer';
    if (e.features?.length) {
      if (hoveredParcelId !== null) {
        map.setFeatureState({ source: 'parcels', sourceLayer: 'parcels', id: hoveredParcelId }, { hover: false });
      }
      hoveredParcelId = e.features[0].id;
      map.setFeatureState({ source: 'parcels', sourceLayer: 'parcels', id: hoveredParcelId }, { hover: true });
    }
  });

  map.on('mouseleave', layerId, () => {
    map.getCanvas().style.cursor = '';
    if (hoveredParcelId !== null) {
      map.setFeatureState({ source: 'parcels', sourceLayer: 'parcels', id: hoveredParcelId }, { hover: false });
    }
    hoveredParcelId = null;
  });
}

// ============================================================
// BOOT
// ============================================================

map.on('load', () => {
  for (const layer of LAYERS) addLayerToMap(layer);
  buildSidebar();
  wireParcelInteractions();

  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 250);
});

map.on('error', (e) => {
  console.error('Map error:', e);
});
</script>
</body>
</html>
